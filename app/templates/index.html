<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EcoSort-Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
</head>
<body>
    <main class="carte">
        <svg class="fond-pointille" width="100%" height="100%">
            <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
                <circle cx="2" cy="2" r="1.2" fill="#57603F"></circle>
            </pattern>
            <rect width="100%" height="100%" fill="url(#dots)"></rect>
        </svg>

        <img class="ampoule-deco haut-droite" src="{{ url_for('static', filename='images/ampoule-olive.jpg') }}" alt="">
        <img class="ampoule-deco bas-gauche" src="{{ url_for('static', filename='images/ampoule-olive.jpg') }}" alt="">

        <div class="contenu">
            <div class="badge-eco">
                <img src="{{ url_for('static', filename='images/badge-eco.jpg') }}" alt="Eco">
            </div>

            <div class="logo-rond">
                <img src="{{ url_for('static', filename='images/logo-mains.jpg') }}" alt="EcoSort-Search">
            </div>

            <h1 class="titre-amatic">EcoSort-Search</h1>
            <p class="sous-titre">Trouve la bonne poubelle pour ton produit</p>

            <!-- Carrousel : explique le role de chaque poubelle avant la recherche -->
            <div id="carrousel">
                <div class="slide-carrousel actif" style="background:#FFF6CC;">
                    <div class="slide-icone" style="background:#FFD500;">
                        <i class="ti ti-bottle" style="color:#5C4A00;font-size:18px;"></i>
                    </div>
                    <div class="slide-texte">
                        <p class="slide-titre" style="color:#5C4A00;">Bac jaune</p>
                        <p class="slide-detail" style="color:#5C4A00;">Plastique, metal, carton</p>
                    </div>
                </div>
                <div class="slide-carrousel" style="background:#E1EFE1;">
                    <div class="slide-icone" style="background:#2E7D32;">
                        <i class="ti ti-glass" style="color:#fff;font-size:18px;"></i>
                    </div>
                    <div class="slide-texte">
                        <p class="slide-titre" style="color:#1B4620;">Bac vert</p>
                        <p class="slide-detail" style="color:#1B4620;">Verre uniquement</p>
                    </div>
                </div>
                <div class="slide-carrousel" style="background:#DCE9F7;">
                    <div class="slide-icone" style="background:#1565C0;">
                        <i class="ti ti-news" style="color:#fff;font-size:18px;"></i>
                    </div>
                    <div class="slide-texte">
                        <p class="slide-titre" style="color:#0D3B66;">Bac bleu</p>
                        <p class="slide-detail" style="color:#0D3B66;">Papier et cartons fins</p>
                    </div>
                </div>
                <div class="slide-carrousel" style="background:#E4E4E4;">
                    <div class="slide-icone" style="background:#616161;">
                        <i class="ti ti-device-mobile" style="color:#fff;font-size:18px;"></i>
                    </div>
                    <div class="slide-texte">
                        <p class="slide-titre" style="color:#2B2B2B;">Bac D3E</p>
                        <p class="slide-detail" style="color:#2B2B2B;">Appareils electroniques</p>
                    </div>
                </div>
                <div class="slide-carrousel" style="background:#E9DED9;">
                    <div class="slide-icone" style="background:#4E342E;">
                        <i class="ti ti-trash" style="color:#fff;font-size:18px;"></i>
                    </div>
                    <div class="slide-texte">
                        <p class="slide-titre" style="color:#3B2620;">Bac marron</p>
                        <p class="slide-detail" style="color:#3B2620;">Non recyclable</p>
                    </div>
                </div>
            </div>
            <div id="points-carrousel"></div>

            <form action="{{ url_for('recherche') }}" method="post" class="barre-recherche">
                <input type="text" name="mot_cle" placeholder="Ex : bouteille plastique, cahier..." required>
                <button type="submit" class="bouton-recherche">
                    <i class="ti ti-search" style="color:#1B2420;font-size:15px;"></i>
                </button>
            </form>
        </div>
    </main>

    <script>
        const slides = document.querySelectorAll('#carrousel .slide-carrousel');
        const pointsWrap = document.getElementById('points-carrousel');
        slides.forEach((s, i) => {
            const p = document.createElement('span');
            if (i === 0) p.classList.add('actif');
            pointsWrap.appendChild(p);
        });
        let indexActuel = 0;
        setInterval(() => {
            slides[indexActuel].classList.remove('actif');
            pointsWrap.children[indexActuel].classList.remove('actif');
            indexActuel = (indexActuel + 1) % slides.length;
            slides[indexActuel].classList.add('actif');
            pointsWrap.children[indexActuel].classList.add('actif');
        }, 2200);
    </script>
</body>
</html>
